    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musicageddon</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <ul class="nav-list">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Musicageddon</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../categories/chords.html">Аккорди</a>

            <a class="nav-link" href="../categories/scales.html">Гами</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../tools/notewriter.html">NoteWriter</a>

      <h1>Musicageddon</h1>
      <p><strong>Платформа</strong> для вивчення теорії музики</p>
    </header>
    <main class="main">
      <section class="section">
        <h2 class="section_title">Створення композиції</h2>

        <form class="form">
          <label class="form_label">Назва композиції</label><br />
          <input
            class="form_input"
            title="name_of_composition"
            type="text"
          /><br /><br />

          <label class="form_label">Темп (BPM)</label><br />
          <input class="form_input" title="bpm" type="number" /><br /><br />

          <label class="form_label">Ноти / таби</label><br />
          <textarea
            class="form_textarea"
            title="notes"
            rows="8"
            cols="40"
          ></textarea
          ><br /><br />

          <button class="btn btn_primary" type="submit">Зберегти</button>
          <button class="btn btn_secondary" type="reset">Очистити</button>
        </form>
      </section>
    </main>
    <footer class="footer">
      <p>© 2026 Musicageddon</p>
    </footer>
  </body>
